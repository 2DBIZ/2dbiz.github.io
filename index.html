<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>2DBIZ | Software Engineering Lab</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&amp;family=Outfit:wght@100;300;400;700&amp;family=Space+Grotesk:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "obsidian": "#030406",
                        "onyx": "#0a0b0d",
                        "metal-light": "#e4e4e7",
                        "metal-dark": "#71717a",
                    },
                    fontFamily: {
                        "sans": ["Outfit", "sans-serif"],
                        "serif-elegant": ["Cormorant Garamond", "serif"],
                        "wide": ["Space Grotesk", "sans-serif"],
                    },
                    animation: {
                        'liquid': 'liquidMove 40s ease-in-out infinite alternate',
                        'grid-drift': 'gridDrift 20s linear infinite',
                        'grid-rotate': 'gridRotate 60s linear infinite',
                        'shimmer': 'shimmer 10s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        liquidMove: {
                            '0%': { transform: 'scale(1.1) translate(-2%, -2%)' },
                            '100%': { transform: 'scale(1.3) translate(2%, 2%)' },
                        },
                        gridDrift: {
                            '0%': { backgroundPosition: '0px 0px' },
                            '100%': { backgroundPosition: '0px 80px' },
                        },
                        gridRotate: {
                            '0%': { transform: 'perspective(1000px) rotateX(60deg) rotateZ(0deg) scale(2.5)' },
                            '100%': { transform: 'perspective(1000px) rotateX(60deg) rotateZ(360deg) scale(2.5)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-100% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        scanline: {
                            '0%': { backgroundPosition: '0% 0%' },
                            '100%': { backgroundPosition: '0% 100%' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {--grid-line: rgba(130, 180, 255, 0.4); 
            --grid-glow: rgba(100, 149, 237, 0.2);
            --logo-gradient: linear-gradient(135deg, #ffffff 0%, #d4d4d8 25%, #71717a 50%, #d4d4d8 75%, #ffffff 100%);
        }
        body {
            background-color: #030406;
            overflow: hidden;
            perspective: 1000px;
        }
        .liquid-bg {
            background: radial-gradient(circle at 50% 50%, #0f131a 0%, #030406 80%);
            filter: contrast(110%) brightness(100%);
        }
        .grid-perspective {
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 80px 80px;
            width: 300vw;height: 300vh;
            position: absolute;
            top: -100%;
            left: -100%;
            transform-style: preserve-3d;
            transform-origin: center center;
            mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
            box-shadow: 0 0 100px var(--grid-glow);
        }.scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }
        .crt-flicker {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.02; }
            50% { opacity: 0.05; }
            100% { opacity: 0.02; }
        }
        .logo-metallic {
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% auto;
            animation: shimmer 8s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 2px rgba(255,255,255,0.2));-webkit-text-fill-color: transparent;
        }
        .custom-kerning {
            letter-spacing: -0.06em;
        }
        #scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body class="font-sans text-zinc-400 h-screen w-screen flex flex-col relative selection:bg-white/10 overflow-hidden">
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden" id="scene">
<div class="absolute inset-0 liquid-bg animate-liquid opacity-80"></div>
<div class="absolute inset-0 flex items-center justify-center perspective-[1000px]">
<div class="grid-perspective animate-grid-rotate"></div>
</div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-900/[0.1] rounded-full blur-[120px]"></div>
</div>
<div class="scanlines opacity-20"></div>
<div class="crt-flicker"></div>
<header class="absolute top-0 left-0 w-full p-8 md:p-12 flex justify-between items-start z-40 pointer-events-none opacity-60">
<div class="text-[10px] tracking-[0.3em] uppercase font-light text-zinc-500">
        Est. MMXXV
    </div>
<div class="text-[10px] tracking-[0.3em] uppercase font-light text-zinc-500 text-right">
        Boutique<br/>Engineering
    </div>
</header>
<main class="relative z-20 flex-grow flex flex-col items-center justify-center w-full">
<div class="flex flex-col items-center justify-center transform -translate-y-8">
<h1 class="text-[5rem] sm:text-[7rem] md:text-[9rem] lg:text-[11rem] xl:text-[13rem] font-bold logo-metallic custom-kerning select-none leading-[0.85] tracking-tighter">
            2DBIZ
        </h1>
<div class="flex items-center gap-4 md:gap-8 mt-4 md:mt-6 opacity-90 transition-opacity duration-700 hover:opacity-100 group">
<div class="h-[1px] w-6 md:w-12 bg-gradient-to-r from-transparent via-blue-300/50 to-zinc-500 group-hover:w-16 transition-all duration-700 ease-out"></div>
<p class="text-xs sm:text-sm md:text-base lg:text-lg font-serif-elegant italic tracking-[0.25em] text-zinc-300 whitespace-nowrap">
                Software Engineering Lab
            </p>
<div class="h-[1px] w-6 md:w-12 bg-gradient-to-l from-transparent via-blue-300/50 to-zinc-500 group-hover:w-16 transition-all duration-700 ease-out"></div>
</div>
</div>
</main>
<footer class="relative z-30 w-full pb-12 px-8 md:pb-16 md:px-16">
<div class="max-w-screen-xl mx-auto border-t border-white/10 pt-8 backdrop-blur-[1px]">
<div class="grid grid-cols-1 md:grid-cols-3 w-full gap-8 md:gap-0 text-[10px] tracking-[0.4em] uppercase font-light text-zinc-500">
<div class="flex flex-row md:flex-col justify-between md:justify-start gap-2 text-left">
<span class="text-zinc-400 font-bold block">Concept</span>
<span class="text-zinc-500">Obsidian Stealth</span>
</div>
<div class="flex flex-row md:flex-col justify-between md:justify-start items-center md:items-center gap-2 text-center border-t border-white/5 md:border-none pt-4 md:pt-0">
<span class="text-zinc-400 font-bold block">Founder</span>
<span class="text-zinc-500">Eng. Squared</span>
</div>
<div class="flex flex-row md:flex-col justify-between md:justify-start items-center md:items-end gap-2 text-right border-t border-white/5 md:border-none pt-4 md:pt-0">
<span class="text-zinc-400 font-bold block">Status</span>
<div class="flex items-center gap-3">
<span class="text-zinc-300 font-medium">Active</span>
<div class="relative w-1.5 h-1.5">
<span class="absolute inline-flex h-full w-full rounded-full bg-blue-500 opacity-75 animate-ping"></span>
<span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></span>
</div>
</div>
</div>
</div>
<div class="text-[9px] tracking-[0.2em] text-zinc-600 uppercase mt-12 text-center opacity-60">
            © MMXXVI 2DBIZ Studio — All Privileges Reserved
        </div>
</div>
</footer>
<div class="fixed top-8 left-8 w-6 h-6 border-t border-l border-blue-200/20 pointer-events-none z-50"></div>
<div class="fixed top-8 right-8 w-6 h-6 border-t border-r border-blue-200/20 pointer-events-none z-50"></div>
<div class="fixed bottom-8 left-8 w-6 h-6 border-b border-l border-blue-200/20 pointer-events-none z-50"></div>
<div class="fixed bottom-8 right-8 w-6 h-6 border-b border-r border-blue-200/20 pointer-events-none z-50"></div>
</body></html>
